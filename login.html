<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danprel Engineering Automation Private Limited</title>
    <link rel="icon" type="image/png" href="asset/image.png">
    <meta name="description"
        content="Secure portal login for Danprel Engineering Automation Resource Allocation Console.">

    <!-- Google Fonts: Outfit for a modern, industrial feel -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-primary: #002d5a;
            --brand-secondary: #001021;
            --accent-blue: #0ea5e9;
            --accent-teal: #14b8a6;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --white: #ffffff;
            --error: #ef4444;
            --input-bg: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--brand-secondary) 0%, var(--brand-primary) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── BACKGROUND ART ── */
        .bg-mesh {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(at 0% 0%, hsla(199, 100%, 50%, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(174, 100%, 50%, 0.1) 0, transparent 50%);
            z-index: 0;
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* ── CARD ── */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-accent {
            height: 6px;
            background: linear-gradient(90deg, var(--brand-primary), var(--accent-blue), var(--accent-teal));
        }

        header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            padding: 12px;
        }

        .logo-box img {
            max-width: 100%;
            object-fit: contain;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--brand-primary);
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-teal);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ── FORM ── */
        .card-content {
            padding: 10px 40px 40px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .control {
            position: relative;
        }

        .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .input {
            width: 100%;
            height: 54px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 0 16px 0 48px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 45, 90, 0.05);
        }

        .toggle-pass {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            transition: color 0.2s;
        }

        .toggle-pass:hover {
            color: var(--brand-primary);
        }

        /* ── OPTIONS ── */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            user-select: none;
        }

        .remember-me input {
            cursor: pointer;
            accent-color: var(--brand-primary);
            width: 16px;
            height: 16px;
        }

        /* ── BUTTON ── */
        .btn-login {
            width: 100%;
            height: 54px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: var(--brand-secondary);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ── ALERTS ── */
        .alert {
            display: none;
            background: #fee2e2;
            border-left: 4px solid var(--error);
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        /* ── FOOTER ── */
        .card-footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            background: #fcfcfc;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="login-wrap">
        <div class="login-card">
            <div class="top-accent"></div>

            <header>
                <div class="logo-box">
                    <img src="asset/image.png" alt="Danprel Logo"
                        onerror="this.src='https://via.placeholder.com/80?text=D'">
                </div>
                <h1 class="brand-title">DANPREL</h1>
                <p class="brand-subtitle">Engineering Automation Pvt Ltd</p>
            </header>

            <main class="card-content">
                <div id="alert" class="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span id="alert-text">Invalid credentials. Please try again.</span>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label class="label">Username</label>
                        <div class="control">
                            <i class="bi bi-person icon"></i>
                            <input type="text" id="username" class="input" required placeholder="User ID">
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="label">Password</label>
                        <div class="control">
                            <i class="bi bi-lock icon"></i>
                            <input type="password" id="password" class="input" required placeholder="••••••••">
                            <i class="bi bi-eye toggle-pass" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            Remember Me
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-login">
                        <span id="btn-text">Sign In</span>
                        <i class="bi bi-arrow-right-short" style="font-size: 1.5rem;"></i>
                    </button>
                </form>
            </main>

            <footer class="card-footer">
                <p class="footer-text">© 2026 Danprel Engineering Automation Pvt Ltd.</p>
            </footer>
        </div>
    </div>

    <script>
        const VALID_USER = 'danprelresource';
        const VALID_PASS = 'danprel';

        const loginForm = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const alertBox = document.getElementById('alert');
        const passwordInput = document.getElementById('password');
        const usernameInput = document.getElementById('username');
        const rememberCheck = document.getElementById('remember');
        const togglePass = document.getElementById('togglePassword');

        // Check for remembered user
        if (localStorage.getItem('remembered_user')) {
            usernameInput.value = localStorage.getItem('remembered_user');
            rememberCheck.checked = true;
        }

        // Toggle Password visibility
        togglePass.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePass.classList.toggle('bi-eye');
            togglePass.classList.toggle('bi-eye-slash');
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alertBox.style.display = 'none';

            const user = usernameInput.value.trim();
            const pass = passwordInput.value.trim();

            // UI state: loading
            submitBtn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div>';
            const icon = submitBtn.querySelector('i');
            if (icon) icon.style.display = 'none';

            setTimeout(() => {
                if (user === VALID_USER && pass === VALID_PASS) {
                    // Handle Remember Me
                    if (rememberCheck.checked) {
                        localStorage.setItem('remembered_user', user);
                    } else {
                        localStorage.removeItem('remembered_user');
                    }

                    localStorage.setItem('danprel_auth', 'true');
                    window.location.href = 'summary.html';
                } else {
                    submitBtn.disabled = false;
                    btnText.textContent = 'Sign In';
                    if (icon) icon.style.display = 'block';
                    alertBox.style.display = 'block';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }, 1000);
        });

        // Hide alert on input
        [usernameInput, passwordInput].forEach(el => {
            el.addEventListener('input', () => {
                alertBox.style.display = 'none';
            });
        });
    </script>
</body>

</html>
